<!-- templates/register.html -->
{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create an account</h1>
                <p>Start sending professional emails in minutes</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required 
                           placeholder="johndoe" autocomplete="username">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="john@example.com" autocomplete="email">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" required 
                               placeholder="Create a strong password" autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="password">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <small class="strength-text"></small>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="confirm_password" name="confirm_password" required 
                               placeholder="Confirm your password" autocomplete="new-password">
                        <button type="button" class="toggle-password" data-target="confirm_password">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="confirmError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" required>
                        <span>I agree to the <a href="/terms">Terms of Service</a> and <a href="/privacy">Privacy Policy</a></span>
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-full">Create account</button>

                <div class="auth-footer">
                    <p>Already have an account? <a href="/login">Sign in</a></p>
                </div>
            </form>

            <div class="auth-divider">
                <span>Or continue with</span>
            </div>

            <div class="social-auth">
                <button class="btn-social" onclick="socialLogin('github')">
                    <span>GitHub</span>
                </button>
                <button class="btn-social" onclick="socialLogin('google')">
                    <span>Google</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
const passwordInput = document.getElementById('password');
const strengthBar = document.querySelector('.strength-bar');
const strengthText = document.querySelector('.strength-text');

// Password strength checker
passwordInput.addEventListener('input', function() {
    const password = this.value;
    let strength = 0;
    let message = '';
    
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^a-zA-Z0-9]/)) strength++;
    
    switch(strength) {
        case 0:
        case 1:
            strengthBar.className = 'strength-bar weak';
            message = 'Weak password';
            break;
        case 2:
            strengthBar.className = 'strength-bar fair';
            message = 'Fair password';
            break;
        case 3:
            strengthBar.className = 'strength-bar good';
            message = 'Good password';
            break;
        case 4:
            strengthBar.className = 'strength-bar strong';
            message = 'Strong password!';
            break;
    }
    
    strengthText.textContent = message;
});

// Toggle password visibility
document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', function() {
        const target = document.getElementById(this.dataset.target);
        const type = target.getAttribute('type') === 'password' ? 'text' : 'password';
        target.setAttribute('type', type);
        this.querySelector('.eye-icon').textContent = type === 'password' ? '👁️' : '🙈';
    });
});

// Form submission
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Clear previous errors
    document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
    
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    const terms = document.getElementById('terms').checked;
    
    // Validation
    let hasError = false;
    
    if (username.length < 3) {
        document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
        hasError = true;
    }
    
    if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        hasError = true;
    }
    
    if (password.length < 8) {
        document.getElementById('passwordError').textContent = 'Password must be at least 8 characters';
        hasError = true;
    }
    
    if (password !== confirmPassword) {
        document.getElementById('confirmError').textContent = 'Passwords do not match';
        hasError = true;
    }
    
    if (!terms) {
        showNotification('Please accept the Terms of Service', 'error');
        hasError = true;
    }
    
    if (hasError) return;
    
    // Show loading state
    const submitBtn = document.querySelector('#registerForm button[type="submit"]');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Creating account...';
    submitBtn.disabled = true;
    
    try {
        const response = await fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ username, email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showNotification('Account created successfully! Redirecting to login...', 'success');
            setTimeout(() => {
                window.location.href = '/login';
            }, 2000);
        } else {
            showNotification(data.error || 'Registration failed', 'error');
            if (data.error.includes('Username')) {
                document.getElementById('usernameError').textContent = data.error;
            } else if (data.error.includes('Email')) {
                document.getElementById('emailError').textContent = data.error;
            }
        }
    } catch (error) {
        showNotification('Network error. Please try again.', 'error');
    } finally {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
    }
});

function socialLogin(provider) {
    showNotification(`${provider} login coming soon!`, 'info');
}
</script>
{% endblock %}
